version: '3'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: palindot-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
    env_file:
      - .env
    networks:
      - palindot
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: palindot-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: palindot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: palindot
    ports:
      - "3306:3306"
    volumes:
      - palindot-db:/var/lib/mysql
    networks:
      - palindot

  frontend:
    image: node:20
    container_name: palindot-frontend
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - palindot

networks:
  palindot:
    driver: bridge

volumes:
  palindot-db:
    driver: local
